.floral-ov{position:fixed;inset:0;background:rgba(255,240,245,.15);z-index:1}
.screen{position:fixed;inset:0;z-index:10;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.screen.active{display:flex}
#s-join .box{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:380px;text-align:center}
#s-join .logo{font-size:36px;margin-bottom:8px}
#s-join h1{font-size:22px;font-weight:900;color:#A8295A;margin-bottom:4px}
#s-join p{font-size:14px;color:#888;font-weight:600;margin-bottom:20px}
#s-join input{width:100%;border:2px solid #F5C6D8;border-radius:12px;padding:14px 16px;font-size:16px;font-family:"Nunito",sans-serif;font-weight:700;color:#2C1A22;outline:none;margin-bottom:12px}
#s-join input:focus{border-color:#D4537E}
#s-join button{width:100%;background:#A8295A;border:none;border-radius:12px;padding:15px;font-size:17px;font-weight:800;color:#fff;cursor:pointer;font-family:"Nunito",sans-serif}
#s-wait .box{background:rgba(255,255,255,.95);border-radius:20px;padding:32px 24px;width:100%;max-width:380px;text-align:center}
#s-wait .wi{font-size:48px;margin-bottom:12px}
#s-wait h2{font-size:20px;font-weight:900;color:#A8295A;margin-bottom:6px}
#s-wait p{font-size:14px;color:#888;font-weight:600;line-height:1.5}
.player-chip{display:inline-block;background:#FBEAF0;border-radius:50px;padding:6px 16px;font-size:14px;font-weight:800;color:#A8295A;margin-top:12px}
.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
#s-question{justify-content:flex-start;padding:0;background:#A8295A}
.q-top{background:#7A1A40;width:100%;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.q-top-label{font-size:13px;font-weight:800;color:#F5C6D8}
.q-top-score{font-size:13px;font-weight:900;color:#F9E795}
.q-body{flex:1;width:100%;padding:14px 16px;display:flex;flex-direction:column;gap:10px;overflow:hidden}
.q-card{background:#fff;border-radius:12px;border-left:5px solid #D4537E;padding:14px 16px}
.q-lbl{font-size:10px;font-weight:800;color:#D4537E;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.q-text{font-size:clamp(15px,4vw,19px);font-weight:800;color:#2C1A22;line-height:1.35}
.clues-area{display:flex;flex-direction:column;gap:7px}
.clue-row{background:#F5C6D8;border-radius:8px;display:flex;align-items:stretch;overflow:hidden;min-height:44px}
.clue-badge{background:#D4537E;color:#fff;font-size:10px;font-weight:800;padding:0 10px;display:flex;align-items:center;min-width:56px;justify-content:center}
.clue-txt{font-size:clamp(12px,3.5vw,14px);color:#2C1A22;padding:10px 12px;font-weight:600;line-height:1.35;display:flex;align-items:center}
.answer-area{background:#fff;border-radius:12px;padding:14px 16px;flex-shrink:0}
.answer-lbl{font-size:10px;font-weight:800;color:#D4537E;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.answer-input{width:100%;border:2px solid #F5C6D8;border-radius:10px;padding:12px 14px;font-size:16px;font-family:"Nunito",sans-serif;font-weight:700;color:#2C1A22;outline:none;margin-bottom:10px}
.answer-input:focus{border-color:#D4537E}
.answer-input:disabled{background:#f9f9f9;color:#aaa}
.submit-btn{width:100%;background:#A8295A;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:800;color:#fff;cursor:pointer;font-family:"Nunito",sans-serif}
.submit-btn:disabled{background:#ccc;cursor:default}
.status-box{border-radius:10px;padding:14px 16px;text-align:center}
.status-box.ok{background:#EAF3DE;border:2px solid #3B6D11}
.status-box.ok p{font-size:15px;font-weight:800;color:#27500A}
.status-box.ok small{font-size:12px;color:#3B6D11;font-weight:600}
.status-box.warn{background:#FAEEDA;border:2px solid #854F0B}
.status-box.warn p{font-size:15px;font-weight:800;color:#633806}
#s-winner{background:#A8295A}
#s-winner .box{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:380px;text-align:center}
.w-emoji{font-size:52px;margin-bottom:8px}
.w-title{font-size:22px;font-weight:900;color:#A8295A;margin-bottom:4px}
.w-pts{font-size:32px;font-weight:900;color:#D4537E;margin-bottom:8px}
.w-sub{font-size:14px;color:#888;font-weight:600}
#s-board{background:#A8295A}
#s-board .box{background:#fff;border-radius:20px;padding:20px;width:100%;max-width:380px;max-height:85vh;overflow-y:auto}
#s-board h2{font-size:18px;font-weight:900;color:#A8295A;margin-bottom:12px;text-align:center}
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #F5C6D8}
.lb-row:last-child{border-bottom:none}
.lb-rank{font-size:18px;font-weight:900;min-width:28px}
.lb-name{font-size:14px;font-weight:800;color:#2C1A22;flex:1}
.lb-pts{font-size:18px;font-weight:900;color:#A8295A}
.lb-me{background:#FBEAF0;border-radius:8px;padding:2px 6px}
</style>
</head>

<div class="floral"></div>
<div class="floral-ov"></div>

<div class="screen active" id="s-join">

    <p>Enter your name to join!</p>
    <input type="text" id="name-in" placeholder="Your name..." maxlength="25" autocomplete="off">
    <button onclick="joinGame()">Join the Game →</button>

</div>

</div>

<script>
var Qs=[
  {label:"Trial Question",q:"What deeply respectful Filipino gesture do children perform to greet their mothers and elders every single day — not just on Mother's Day?",clues:["You walk into Lola's house. She extends her hand. You already know what to do.","Skip it once and the whole room notices. Do it without being asked and Nanay beams for the rest of the day.","Two words. One forehead. A hundred years of Filipino values delivered in under three seconds."]},
  {label:"Question 1",q:"What beloved Filipino phrase serves as the ultimate honorific title for mothers?",clues:["It is one of the most commonly used and beloved cultural descriptions of a mother's role in the Filipino household.","It poetically compares a mother to a source of radiance that keeps the whole household from stumbling in the dark.","It literally translates to "light of the house" in English — because without her, nobody can find anything. Including the remote."]},
  {label:"Question 2",q:"What legendary Filipino "weapon" is famously associated with mothers when disciplining children?",clues:["It usually starts its journey on a mother's feet… until it's suddenly reassigned mid-sentence.","It may look harmless, but it has an almost supernatural ability to find its target with pinpoint accuracy.","It is flat, flexible, and commonly made of rubber — yet somehow carries serious authority in the household."]},
  {label:"Question 3",q:"What is the most common unintentional scam by moms that almost all children fall prey to?",clues:["You or a friend may have experienced this at home.","You expect dessert but end up deeply disappointed.","You grab it from the freezer... and fish eyes stare back at you."]},
  {label:"Question 4",q:"What is the best gift you can give Nanay that she will immediately brag about to her kumares?",clues:["Paper is the way to go.","No to red, purple, or yellow.","They can look like flowers — but make sure it's blue."]},
  {label:"Question 5",q:"What classic Nanay behavior turns every empty container into a surprise mystery box?",clues:["You were sure you threw away that empty coffee jar... yet somehow it reappeared and now contains sugar.","Last month she wanted bottled soy sauce. This month, refill pouches — because sayang naman ang bote.","In a Filipino household, an ice cream container rarely contains ice cream. Today it's leftovers. Tomorrow, frozen fish."]},
  {label:"Question 6",q:"What Filipino mom superpower allows her to find missing items that were definitely not there two seconds ago?",clues:["You already checked the table, the cabinet, the sofa, and somehow still failed.","Your mother walks in, looks once, and immediately finds it while giving you a disappointed stare.","The object was somehow right in front of you the entire time — according to her."]},
  {label:"Question 7",q:"What bag becomes a treasured family collection because Nanay cannot bring herself to let a single one go?",clues:["Every bag has a future. Nanay sees it. You do not. You will understand someday.","They live inside each other, Russian doll style, in a cabinet that is always suspiciously full.","It came from SM. It came from Puregold. It came from that Divisoria trip in 2014. They are all still here."]},
  {label:"Question 8",q:"What classic Filipino mom litany triggers the moment she sees lights or appliances left on in an empty room?",clues:["She acts like every unused electric fan is personally shortening her lifespan — financially.","The electricity bill is not just a bill. It is evidence. It is Exhibit A. It will be presented.","You are not poor. You are not rich. But your relationship with the light switch suggests otherwise."]},
  {label:"Question 9",q:"The line your mom used that made you realize you were apparently born into extreme wealth?",clues:["It has nothing to do with your bank account, inheritance, or business empire.","It is triggered by something you did — or more accurately, something you failed to stop doing.","Delivered at maximum volume. Around lunchtime. While you are still horizontal."]},
  {label:"Question 10",q:"What is Nanay's greatest weakness — and your greatest competition for her attention?",clues:["You drove four hours to visit her. She glanced at you once. After that, all attention was elsewhere.","The video call used to be about you. Now you are just the one holding the phone so she can see them better.","She flew to your house. She brought gifts. None of them were for you."]}
];
var myName="",myScore=0,submitted=false,answered=false,ws,reconnTimer;
function show(id){document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("active");});document.getElementById(id).classList.add("active");}
function connect(){
  var proto=location.protocol==="https:"?"wss:":"ws:";
  ws=new WebSocket(proto+"//"+location.host);
  ws.onopen=function(){if(myName)ws.send(JSON.stringify({type:"join",name:myName}));clearInterval(reconnTimer);};
  ws.onmessage=function(e){handle(JSON.parse(e.data));};
  ws.onclose=function(){reconnTimer=setInterval(connect,3000);};
}
function handle(msg){
  if(msg.type==="joined"){myScore=msg.score||0;updateScore();show("s-wait");applyState(msg.state);}
  if(msg.type==="state"){applyState(msg.state);}
  if(msg.type==="answer_received"){submitted=true;document.getElementById("answer-area").innerHTML="<div class="status-box ok"><p>✅ Answer submitted!</p><small>Waiting for host to review...</small></div>";}
  if(msg.type==="winner_announced"){var won=msg.name===myName;if(won){myScore+=msg.points||0;updateScore();}showWinner(won,msg.name,msg.points);}
  if(msg.type==="scores_update"){showBoard(msg.scores);}
}
function applyState(st){
  if(!st)return;
  if(st.phase==="waiting"){show("s-wait");submitted=false;answered=false;}
  if(st.phase==="question"){renderQ(st);}
  if(st.phase==="closed"){if(!submitted){var aa=document.getElementById("answer-area");if(aa)aa.innerHTML="<div class="status-box warn"><p>⏰ Submissions closed.</p></div>";}}
}
function renderQ(st){
  var d=Qs[st.currentQ];if(!d)return;
  submitted=false;answered=false;
  document.getElementById("q-lbl-top").textContent=d.label;
  document.getElementById("q-num-p").textContent=d.label;
  document.getElementById("q-text-p").textContent=d.q;
  var cp=document.getElementById("clues-p");cp.innerHTML="";
  for(var i=0;i<st.cluesShown;i++){var r=document.createElement("div");r.className="clue-row";r.innerHTML="<div class="clue-badge">Clue "+(i+1)+"</div><div class="clue-txt">"+d.clues[i]+"</div>";cp.appendChild(r);}
  document.getElementById("answer-area").innerHTML="<div class="answer-lbl">Your Answer</div><input type="text" class="answer-input" id="ans-in" placeholder="Type your answer..." maxlength="100" autocomplete="off"><button class="submit-btn" id="sub-btn" onclick="submitAnswer()">Submit Answer ✓</button>";
  document.getElementById("ans-in").addEventListener("keydown",function(e){if(e.key==="Enter")submitAnswer();});
  show("s-question");
}
function showWinner(won,name,pts){answered=true;var box=document.getElementById("winner-box");if(won){box.innerHTML="<div class="w-emoji">🏆</div><div class="w-title">YOU GOT IT!</div><div class="w-pts">+"+pts+" pts</div><div class="w-sub">Total: "+myScore+" pts</div>";}else{box.innerHTML="<div class="w-emoji">😅</div><div class="w-title">"+name+" got it!</div><div class="w-sub">Better luck next round!<br>Your score: "+myScore+" pts</div>";}show("s-winner");}
function showBoard(scores){var sorted=Object.entries(scores).sort(function(a,b){return b[1]-a[1];});var medals=["🥇","🥈","🥉"];document.getElementById("lb-list").innerHTML=sorted.map(function(e,i){var me=e[0]===myName;return "<div class="lb-row"+(me?" lb-me":"")+""><span class="lb-rank">"+(medals[i]||(i+1)+".")+"</span><span class="lb-name">"+e[0]+(me?" (you)":"")+"</span><span class="lb-pts">"+e[1]+"</span></div>";}).join("");show("s-board");}
function updateScore(){document.getElementById("score-top").textContent=myScore;}
function joinGame(){var n=document.getElementById("name-in").value.trim();if(!n)return;myName=n;document.getElementById("wait-chip").textContent="👋 "+n;connect();}
function submitAnswer(){var a=document.getElementById("ans-in");if(!a||submitted)return;var val=a.value.trim();if(!val)return;ws.send(JSON.stringify({type:"submit_answer",answer:val}));}
document.addEventListener("DOMContentLoaded",function(){document.getElementById("name-in").addEventListener("keydown",function(e){if(e.key==="Enter")joinGame();});});
</script>
</body>
</html>
